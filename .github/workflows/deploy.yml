name: Build & Deploy → agrocom.fastergo.uz

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:

  # ─── Nima o'zgardi? ──────────────────────────────────────────────────────
  changes:
    name: 🔍 Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'AgroComB/**'
            frontend:
              - 'AgroComF/**'

  # ─── Backend image build ──────────────────────────────────────────────────
  build-backend:
    name: 🔨 Build Backend Image
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: 🔡 Lowercase image name
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')-backend" >> $GITHUB_ENV

      - name: 🔑 Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Image meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: type=raw,value=latest

      - uses: docker/setup-buildx-action@v3

      - name: 🐳 Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./AgroComB
          dockerfile: ./AgroComB/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  # ─── Frontend image build ─────────────────────────────────────────────────
  build-frontend:
    name: 🔨 Build Frontend Image
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: 🔡 Lowercase image name
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')-frontend" >> $GITHUB_ENV

      - name: 🔑 Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Image meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: type=raw,value=latest

      - uses: docker/setup-buildx-action@v3

      - name: 🐳 Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./AgroComF
          dockerfile: ./AgroComF/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ─── Deploy ───────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy → server
    runs-on: ubuntu-latest
    needs: [changes, build-backend, build-frontend]
    if: ${{ always() && !failure() && !cancelled() }}
    environment:
      name: production
      url: https://agrocom.fastergo.uz

    steps:
      - uses: actions/checkout@v4

      - name: 🔡 Lowercase image prefix
        run: echo "IMAGE_PREFIX=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: 🔑 SSH sozlash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: 📤 docker-compose.yml ni serverga yuborish
        run: |
          scp -i ~/.ssh/deploy_key docker-compose.yml ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/agrocompro/docker-compose.yml

      - name: 🔄 Deploy
        env:
          BACKEND_CHANGED: ${{ needs.changes.outputs.backend }}
          FRONTEND_CHANGED: ${{ needs.changes.outputs.frontend }}
          EVENT_NAME: ${{ github.event_name }}
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          ACTOR: ${{ github.actor }}
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} bash -s << EOF
            set -e
            cd /opt/agrocompro

            sed -i "s|GITHUB_REPO=.*|GITHUB_REPO=${IMAGE_PREFIX}|" .env

            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${ACTOR}" --password-stdin

            docker compose up -d mysql

            if [ "${BACKEND_CHANGED}" = "true" ] || [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
              echo "Backend yangilanmoqda..."
              docker pull ghcr.io/${IMAGE_PREFIX}-backend:latest
              docker compose up -d --force-recreate backend
            fi

            if [ "${FRONTEND_CHANGED}" = "true" ] || [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
              echo "Frontend yangilanmoqda..."
              docker pull ghcr.io/${IMAGE_PREFIX}-frontend:latest
              docker compose up -d --force-recreate frontend
            fi

            docker exec agroerp_caddy caddy reload --config /etc/caddy/Caddyfile || true
            docker image prune -f
            echo "Deploy: \$(date)"
          EOF

      - name: 🏥 Health check
        run: |
          sleep 20
          curl -fk --retry 5 --retry-delay 5 https://agrocom.fastergo.uz \
            && echo "Frontend ishlayapti" \
            || echo "Frontend health check muvaffaqiyatsiz"
          curl -fk --retry 3 --retry-delay 3 https://agrocomapi.fastergo.uz \
            && echo "Backend ishlayapti" \
            || echo "Backend health check muvaffaqiyatsiz"

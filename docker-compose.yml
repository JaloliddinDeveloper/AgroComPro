services:
  mysql:
    image: mysql:8.0
    container_name: agrocom-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: AgroComDB
      MYSQL_USER: jaloliddin
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - agrocom-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/${GITHUB_REPO}-backend:latest
    container_name: agrocom-backend
    restart: unless-stopped
    environment:
      ConnectionStrings__DefaultConnection: "Server=mysql;Database=AgroComDB;User=jaloliddin;Password=${MYSQL_PASSWORD};AllowPublicKeyRetrieval=True;"
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: "8080"
    volumes:
      - backend_images:/app/wwwroot/images
      - /var/www/files:/app/wwwroot/files
      - /var/www/files:/var/www/files
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - agrocom-network

  frontend:
    image: ghcr.io/${GITHUB_REPO}-frontend:latest
    container_name: agrocom-frontend
    restart: unless-stopped
    networks:
      - agrocom-network

volumes:
  mysql_data:
    name: agrocom_mysqldata
  backend_images:
    name: agrocom_backend_images

networks:
  agrocom-network:
    name: agrocom-network
    driver: bridge

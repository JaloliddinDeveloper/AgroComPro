services:
  caddy:
    image: caddy:2
    container_name: agrocom-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - ACME_EMAIL=${ACME_EMAIL}
      - DOMAIN=${DOMAIN}
    networks:
      - agrocom-network

  mysql:
    image: mysql:8.0
    container_name: agrocom-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: AgroComDB
      MYSQL_USER: jaloliddin
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - agrocom-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./AgroComB
      dockerfile: Dockerfile
    container_name: agrocom-backend
    restart: unless-stopped
    environment:
      ConnectionStrings__DefaultConnection: "Server=mysql;Database=AgroComDB;User=jaloliddin;Password=${MYSQL_PASSWORD};AllowPublicKeyRetrieval=True;"
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: "8080"
    volumes:
      - backend_images:/app/wwwroot/images
      - /var/www/files:/app/wwwroot/files
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - agrocom-network

  frontend:
    build:
      context: ./AgroComF
      dockerfile: Dockerfile
    container_name: agrocom-frontend
    restart: unless-stopped
    networks:
      - agrocom-network

volumes:
  mysql_data:
  backend_images:
  caddy_data:
  caddy_config:

networks:
  agrocom-network:
    driver: bridge
